<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetMyLnk — Link in Bio for Creators</title>
  <meta name="description" content="GetMyLnk is a simple, beautiful link-in-bio platform for content creators." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #111;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px 48px;
      gap: 28px;
      text-align: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .logo span { color: #f4c2c2; }

    .tagline {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.5);
      max-width: 360px;
      line-height: 1.6;
    }

    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary {
      background: #f4c2c2;
      color: #1a1a1a;
      border: none;
    }
    .btn-primary:hover { background: #f0aaaa; transform: translateY(-1px); }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.45); color: #fff; transform: translateY(-1px); }

    footer {
      text-align: center;
      padding: 20px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .footer-links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px 4px;
      margin-bottom: 8px;
    }

    .footer-links a { color: rgba(255,255,255,0.35); font-size: 0.75rem; text-decoration: none; padding: 2px 6px; transition: color 0.2s; }
    .footer-links a:hover { color: rgba(255,255,255,0.7); }
    .footer-sep { color: rgba(255,255,255,0.15); font-size: 0.75rem; }
    .footer-copy { color: rgba(255,255,255,0.2); font-size: 0.7rem; }
  </style>
</head>
<body>

  <main>
    <h1 class="logo">Get<span>My</span>Lnk</h1>
    <p class="tagline">Beautiful link-in-bio pages for creators. One link. Everything you share.</p>
    <div class="cta-row">
      <a class="btn btn-secondary" href="/admin">Admin Dashboard</a>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="/terms">Terms of Service</a>
      <span class="footer-sep">·</span>
      <a href="/contact">Contact</a>
    </div>
    <p class="footer-copy">&copy; 2026 GetMyLnk. All rights reserved.</p>
  </footer>

</body>
</html>
