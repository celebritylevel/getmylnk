<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — GetMyLnk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; flex-direction: column; background-color: #1a1a1a; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    header a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
    header a:hover { color: #ffffff; }
    main { flex: 1; max-width: 560px; width: 100%; margin: 0 auto; padding: 48px 24px 64px; display: flex; flex-direction: column; gap: 28px; }
    h1 { font-size: 1.75rem; font-weight: 700; }
    p { font-size: 0.95rem; line-height: 1.75; color: rgba(255,255,255,0.65); }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    label { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.07em; }
    input, textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #e8e8e8;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #f4c2c2; }
    textarea { resize: vertical; min-height: 120px; }
    .submit-btn {
      background: #f4c2c2;
      border: none;
      border-radius: 10px;
      padding: 13px;
      color: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
    }
    .submit-btn:hover { background: #f0aaaa; }
    .success-msg { background: rgba(80,200,120,0.1); border: 1px solid rgba(80,200,120,0.3); border-radius: 10px; padding: 16px; color: #50c878; font-size: 0.9rem; display: none; }
    footer { text-align: center; padding: 24px 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .footer-links { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px 4px; margin-bottom: 10px; }
    .footer-links a { color: rgba(255,255,255,0.45); font-size: 0.78rem; text-decoration: none; padding: 2px 6px; transition: color 0.2s; }
    .footer-links a:hover { color: rgba(255,255,255,0.8); }
    .footer-sep { color: rgba(255,255,255,0.2); font-size: 0.75rem; }
    .footer-copy { color: rgba(255,255,255,0.25); font-size: 0.72rem; }
  </style>
</head>
<body>
  <header><a href="/">&larr; Back to home</a></header>
  <main>
    <div>
      <h1>Contact Us</h1>
      <p style="margin-top:8px;">Have a question or need help? Send us a message and we'll get back to you.</p>
    </div>
    <div class="success-msg" id="successMsg">Thanks for reaching out! We'll get back to you soon.</div>
    <div class="form-group"><label>Name</label><input type="text" id="cName" placeholder="Your name" /></div>
    <div class="form-group"><label>Email</label><input type="email" id="cEmail" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Message</label><textarea id="cMessage" placeholder="How can we help?"></textarea></div>
    <button class="submit-btn" onclick="submitContact()">Send Message</button>
  </main>
  <script>
    function submitContact() {
      const name = document.getElementById('cName').value.trim();
      const email = document.getElementById('cEmail').value.trim();
      const msg = document.getElementById('cMessage').value.trim();
      if (!name || !email || !msg) { alert('Please fill in all fields.'); return; }
      // For now just show success — wire up a Cloudflare Worker or email service as needed
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('cName').value = '';
      document.getElementById('cEmail').value = '';
      document.getElementById('cMessage').value = '';
    }
  </script>
  <footer>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <span class="footer-sep">·</span>
      <a href="/terms">Terms of Service</a>
      <span class="footer-sep">·</span>
      <a href="/contact">Contact</a>
    </div>
    <p class="footer-copy">&copy; 2026 GetMyLnk. All rights reserved.</p>
  </footer>
</body>
</html>
